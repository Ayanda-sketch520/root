<!-- ENQUIRY FORM -->
<section class="container">

    <div class="card">

        <h2>Bakery Enquiry Form</h2>

        <form id="enquiry-form">

            <label>Full Name</label><br>
            <input type="text" name="fullname" required><br><br>

            <label>Email Address</label><br>
            <input type="email" name="email" required><br><br>

            <label>Phone Number</label><br>
            <input type="tel" name="phone" required><br><br>

            <label>Select Product</label><br>
            <select name="product">
                <option value="Bread">Bread</option>
                <option value="Vetkoek">Vetkoek (Magwinya)</option>
                <option value="Muffins">Muffins</option>
                <option value="Birthday Cake">Birthday Cake</option>
                <option value="Wedding Cake">Wedding Cake</option>
                <option value="Custom">Custom Order</option>
            </select>

            <br><br>

            <label>Quantity</label><br>
            <input type="number" name="quantity" min="1"><br><br>

            <label>Delivery Method</label><br>

            <input type="radio" name="delivery" value="Collection" required> Collection
            <input type="radio" name="delivery" value="Delivery" required> Delivery

            <br><br>

            <label>Order/Event Date</label><br>
            <input type="date" name="date"><br><br>

            <label>Additional Information</label><br>

            <textarea name="message" rows="5" cols="40"
            placeholder="Enter your special requests here..."></textarea>

            <br><br>

            <button type="submit">Submit Enquiry</button>

        </form>

    </div>

</section>
